# .codex-gate.yaml — конфиг ревью-гейтов (плагин gates@lenar-gates). Кладётся в КОРЕНЬ репо,
# КОММИТИТСЯ. Сам файл — жёсткий код-путь (в коде гейта, не здесь): его правка гейтится
# лесенкой и видна Codex-ревью диффа — поэтому здесь допустимы epoch_sha и hard_cap.
# Нет файла / битый YAML / нет PyYAML → СТРОГИЙ режим (все пути = код, лесенка вкл).

code_paths:
  # Префиксы каталогов, считающихся кодом (гейтятся G1 + лесенкой + Codex-ревью).
  prefixes:
    - "app/"
    - "src/"
    - "tests/"
    - "scripts/"
  # Точные файлы-код (корневые манифесты/конфиги, уезжающие в прод).
  exact:
    - "Dockerfile"
    - "docker-compose.yml"
    - "config.yaml"
    - "requirements.txt"
    - "pyproject.toml"
  # NB: .codex-gate.yaml, Makefile, .githooks/ — ВСЕГДА код (жёстко в коде гейта,
  # отключить конфигом нельзя). docs/**, *.md, .claude/** — не код (кроме строгого режима).

ladder:
  # false гасит ТОЛЬКО pre-commit проверку (удобство разработчика);
  # деплой-гейт (check-range) требует лесенку НЕЗАВИСИМО от флага.
  enabled: true
  # Grandfathering: коммиты-предки этого SHA exempt от range-проверки (до-гейтовая история).
  # Ставится /gates-init = HEAD на момент онбординга.
  epoch_sha: ""

convergence:
  # Хард-кап раундов Codex-ревью до carry-over/эскалации (протокол сходимости Фазы 1.6).
  hard_cap: 8

empirical:
  # Опц. (opt-in): механическая проверка ДО Codex — тест-команда проекта как условие деплоя.
  # Порядок деплой-гейта: clean-tree → baseline → ladder → empirical → Codex.
  # Нет секции → гейт пропускается с громкой пометкой. Провал/нечитаемость/таймаут → БЛОК
  # (fail-closed). Осознанный обход — EMPIRICAL_SKIP=1 (аудируется, как LADDER_SKIP).
  # ВАЖНО: снятие/поломка секции после включения = блок без EMPIRICAL_SKIP (было включено в baseline).
  # Исполняется как argv (shlex.split, без shell) — метасимволы НЕ интерпретируются; для
  # пайплайнов/&& оберни в скрипт: test_command: "./run-tests.sh".
  # NB: gitignore артефакты тестов (__pycache__/, .pytest_cache/, .coverage) — иначе они
  # загрязнят дерево и пост-командная проверка «HEAD/дерево не сдвинулись» ложно заблокирует.
  test_command: "python3 -m pytest -q"
  timeout_s: 600   # опц., дефолт 600; невалидное → дефолт

deploy:
  # Опц. (интерфейс к внешнему guard'у/inframon): authoritative-источник задеплоенного SHA —
  # команда (argv, без shell), печатающая полный 40-hex SHA. Настроена и упала/мусор → БЛОК
  # (фолбэка на локальный .last-deployed-sha НЕТ — он и есть проблема). Активация/смена/
  # удаление секции пинуются локально: переходный деплой — через явный CODEX_DEPLOY_BASELINE
  # (аудируется). Вердикт гейта пишется в logs/review_verdicts/<sha>.json (schema 1) — его
  # может проверять внешний guard; скипы в вердикте видимы.
  baseline_command: "ssh myhost cat /app/.deployed-sha"
  baseline_timeout_s: 30   # опц., дефолт 30

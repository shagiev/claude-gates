# .codex-gate.yaml — конфиг ревью-гейтов (плагин gates@lenar-gates). Кладётся в КОРЕНЬ репо,
# КОММИТИТСЯ. Сам файл — жёсткий код-путь (в коде гейта, не здесь): его правка гейтится
# лесенкой и видна Codex-ревью диффа — поэтому здесь допустимы epoch_sha и hard_cap.
# Нет файла / битый YAML / нет PyYAML → СТРОГИЙ режим (все пути = код, лесенка вкл).

code_paths:
  # Префиксы каталогов, считающихся кодом (гейтятся G1 + лесенкой + Codex-ревью).
  prefixes:
    - "app/"
    - "src/"
    - "tests/"
    - "scripts/"
  # Точные файлы-код (корневые манифесты/конфиги, уезжающие в прод).
  exact:
    - "Dockerfile"
    - "docker-compose.yml"
    - "config.yaml"
    - "requirements.txt"
    - "pyproject.toml"
  # NB: .codex-gate.yaml, Makefile, .githooks/ — ВСЕГДА код (жёстко в коде гейта,
  # отключить конфигом нельзя). docs/**, *.md, .claude/** — не код (кроме строгого режима).

ladder:
  # false гасит ТОЛЬКО pre-commit проверку (удобство разработчика);
  # деплой-гейт (check-range) требует лесенку НЕЗАВИСИМО от флага.
  enabled: true
  # Grandfathering: коммиты-предки этого SHA exempt от range-проверки (до-гейтовая история).
  # Ставится /gates-init = HEAD на момент онбординга.
  epoch_sha: ""

convergence:
  # Хард-кап раундов Codex-ревью до carry-over/эскалации (протокол сходимости Фазы 1.6).
  hard_cap: 8
